name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── aegis-compiler ────────────────────────────────────────────────────────────
  compiler:
    name: aegis-compiler (fmt / clippy / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aegis-compiler
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: aegis-compiler

      - name: Format check
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  # ── aegis-runtime ─────────────────────────────────────────────────────────────
  runtime:
    name: aegis-runtime (clippy / build)
    runs-on: ubuntu-latest
    needs: compiler
    defaults:
      run:
        working-directory: aegis-runtime
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: aegis-runtime

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build

  # ── automaguard-rs ────────────────────────────────────────────────────────────
  rust-sdk:
    name: automaguard-rs (fmt / clippy / test)
    runs-on: ubuntu-latest
    needs: runtime
    defaults:
      run:
        working-directory: automaguard-rs
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: automaguard-rs

      - name: Format check
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Clippy (async feature)
        run: cargo clippy --features async -- -D warnings

      - name: Test
        run: cargo test

      - name: Test (async feature)
        run: cargo test --features async

  # ── automaguard-python ─────────────────────────────────────────────────────────
  python:
    name: automaguard-python (maturin build)
    runs-on: ubuntu-latest
    needs: runtime
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: automaguard-python

      - name: Install maturin
        run: pip install maturin

      - name: Build
        working-directory: automaguard-python
        run: maturin build

  # ── automaguard-dotnet ────────────────────────────────────────────────────────
  dotnet-sdk:
    name: automaguard-dotnet (build / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automaguard-dotnet
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore AutomaGuard.sln

      - name: Build
        run: dotnet build AutomaGuard.sln --no-restore -c Release

      - name: Test
        run: dotnet test AutomaGuard.sln --no-build -c Release --logger "console;verbosity=normal"

  # ── automaguard-java ─────────────────────────────────────────────────────────
  java-sdk:
    name: automaguard-java (build / test)
    runs-on: ubuntu-latest
    needs: runtime
    defaults:
      run:
        working-directory: automaguard-java
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: automaguard-java/rust

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Rust JNI library
        run: cargo build --release
        working-directory: automaguard-java/rust

      - name: Build and test
        run: mvn -B -q test -Djava.library.path=rust/target/release

  # ── automaguard-ts ────────────────────────────────────────────────────────────
  typescript-sdk:
    name: automaguard-ts (typecheck / test)
    runs-on: ubuntu-latest
    needs: runtime
    defaults:
      run:
        working-directory: automaguard-ts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: automaguard-ts/package.json

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
