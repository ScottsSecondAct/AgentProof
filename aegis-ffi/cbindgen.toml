# cbindgen configuration — generates aegis.h from the Rust FFI source.
# Run via build.rs or: cbindgen --config cbindgen.toml --crate aegis-ffi --output aegis.h

language = "C"
include_guard = "AEGIS_FFI_H"
tab_width = 4
documentation = true
documentation_style = "c99"
style = "tag"
autogen_warning = "/* THIS FILE IS AUTO-GENERATED BY cbindgen. DO NOT EDIT. */"

[export]
# Only export symbols explicitly marked #[no_mangle] pub extern "C"
include = []
exclude = []

[parse]
parse_deps = false
